<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Center - Earn Cash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .task-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .task-btn { background: #24A1DE; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .task-btn.ad-task { background: #6c5ce7; }
        #display-area { display: none; margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        .timer-display { font-size: 26px; color: #d32f2f; font-weight: bold; margin: 20px 0; padding: 15px; background: #fff5f5; border-radius: 12px; border: 1px solid #ffcdd2; }
        #code-box { display: none; background: #2ecc71; color: white; padding: 25px; border-radius: 15px; font-size: 22px; font-weight: bold; margin-top: 20px; }
        .visit-btn { background: #ff7675; color: white; padding: 15px 35px; border-radius: 40px; text-decoration: none; font-weight: bold; display: inline-block; font-size: 18px; margin-top: 15px; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#24A1DE;"><i class="fas fa-coins"></i> Earn Cash Task Center</h2>
    
    <div class="task-list">
        <button class="task-btn" onclick="loadVideo(1)">Task 1</button>
        <button class="task-btn" onclick="loadVideo(2)">Task 2</button>
        <button class="task-btn" onclick="loadVideo(3)">Task 3</button>
        <button class="task-btn" onclick="loadVideo(4)">Task 4</button>
        <button class="task-btn" onclick="loadVideo(5)">Task 5</button>
        <button class="task-btn" onclick="loadVideo(6)">Task 6</button>
        <button class="task-btn" onclick="loadVideo(7) ">Task 7</button>
        <button class="task-btn" onclick="loadVideo(8)">Task 8</button>
        <button class="task-btn" onclick="loadVideo(9)">Task 9</button>
        <button class="task-btn" onclick="loadVideo(10)">Task 10</button>
        
        <button class="task-btn ad-task" onclick="loadLinkTask(11)">Task 11</button>
        <button class="task-btn ad-task" onclick="loadLinkTask(12)">Task 12</button>
        <button class="task-btn ad-task" onclick="loadLinkTask(13)">Task 13</button>
        <button class="task-btn ad-task" onclick="loadLinkTask(14)">Task 14</button>
        <button class="task-btn ad-task" onclick="loadLinkTask(15)">Task 15</button>
    </div>

    <div id="display-area">
        <h3 id="task-title">লোড হচ্ছে...</h3>
        
        <div id="video-content" style="display:none;">
            <div class="video-box"><div id="player"></div></div>
            <div id="v-timer" class="timer-display">ভিডিও প্লে করুন...</div>
        </div>

        <div id="link-content" style="display:none;">
            <i class="fas fa-external-link-alt" style="font-size: 50px; color:#ff7675;"></i>
            <div id="l-instruction" style="margin-top:10px;">নিচের বাটনে ক্লিক করে কাজ শুরু করুন</div>
            <button id="visit-trigger" class="visit-btn">ভিজিট করুন</button>
            <div id="a-timer" class="timer-display" style="display:none;">অপেক্ষা করুন: ১০ সেকেন্ড</div>
        </div>
        
        <div id="code-box">
            🎉 আপনার সিক্রেট কোড: <span id="final-code"></span>
            <p style="font-size: 14px; font-weight: normal; margin-top:10px;">এই কোডটির স্ক্রিনশট নিয়ে আপনার প্যানেলে জমা দিন।</p>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player, timerInt, timeLeft, isDone = false;
    
    // আপনার দেওয়া ডেটা (ভিডিও আইডি এবং লিংক)
    const data = {
        1: {vid:'rECq3Qcj6oU', t:180, c:'TCP-8821-V1'}, 
        2: {vid:'zWTad9RBYH4', t:180, c:'TCP-4509-V2'},
        3: {vid:'DAxYNwuxq7M', t:180, c:'TCP-3112-V3'}, 
        4: {vid:'dWC7jsxgW2Y', t:180, c:'TCP-9023-V4'},
        5: {vid:'O4i4kN_A68U', t:180, c:'TCP-6674-V5'}, 
        6: {vid:'cPjITHPKHW0', t:300, c:'TCP-1250-V6'},
        7: {vid:'4FAWGwaL3dc', t:300, c:'TCP-7731-V7'}, 
        8: {vid:'PujqH29FuCM', t:300, c:'TCP-5502-V8'},
        9: {vid:'4JTlUw6MEug', t:300, c:'TCP-4489-V9'}, 
        10: {vid:'cZU6GZT7wio', t:300, c:'TCP-2026-V10'},
        11: {url:'https://chonderranimayapori.blogspot.com/', c:'ADS-9910-X1'},
        12: {url:'https://lyricloopzone.blogspot.com/2025/12/tumi-toh-sukhei-acho-bondhu-song-lyrics.html?m=1', c:'ADS-7720-X2'},
        13: {url:'https://t.me/ChonderRaniMayapori', c:'ADS-5530-X3'},
        14: {url:'https://t.me/GmailSellBDChannel', c:'ADS-3340-X4'},
        15: {url:'https://t.me/SpinIncomeBD_bot?start=r00125815586', c:'ADS-1150-X5'}
    };

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '100%', width: '100%', videoId: '', events: { 'onStateChange': onPlayerStateChange } });
    }

    function loadVideo(id) {
        reset();
        timeLeft = data[id].t;
        document.getElementById('task-title').innerText = "Task #" + id + " (ভিডিও)";
        document.getElementById('video-content').style.display = 'block';
        document.getElementById('final-code').innerText = data[id].c;
        document.getElementById('v-timer').innerText = "অপেক্ষা করুন: " + timeLeft + "s";
        player.loadVideoById(data[id].vid);
    }

    function loadLinkTask(id) {
        reset();
        document.getElementById('task-title').innerText = "Task #" + id + " (লিংক)";
        document.getElementById('link-content').style.display = 'block';
        document.getElementById('final-code').innerText = data[id].c;
        
        let visitBtn = document.getElementById('visit-trigger');
        visitBtn.onclick = function() {
            window.open(data[id].url, '_blank');
            visitBtn.style.display = 'none';
            document.getElementById('l-instruction').innerText = "লিংক ভিজিট শুরু হয়েছে। এই পেজে ফিরে এসে ১০ সেকেন্ড অপেক্ষা করুন।";
            document.getElementById('a-timer').style.display = 'block';
            startAdTimer(10);
        };
    }

    function startAdTimer(seconds) {
        timeLeft = seconds;
        timerInt = setInterval(() => {
            timeLeft--;
            document.getElementById('a-timer').innerText = "অপেক্ষা করুন: " + timeLeft + "s";
            if(timeLeft <= 0) {
                clearInterval(timerInt);
                document.getElementById('link-content').style.display = 'none';
                document.getElementById('code-box').style.display = 'block';
            }
        }, 1000);
    }

    function reset() {
        clearInterval(timerInt);
        isDone = false;
        document.getElementById('display-area').style.display = 'block';
        document.getElementById('video-content').style.display = 'none';
        document.getElementById('link-content').style.display = 'none';
        document.getElementById('code-box').style.display = 'none';
        document.getElementById('visit-trigger').style.display = 'inline-block';
        document.getElementById('l-instruction').innerText = "নিচের বাটনে ক্লিক করে কাজ শুরু করুন";
        document.getElementById('a-timer').style.display = 'none';
        if(player && player.stopVideo) player.stopVideo();
    }

    function onPlayerStateChange(e) {
        if (e.data == YT.PlayerState.PLAYING && !isDone) {
            timerInt = setInterval(() => {
                timeLeft--;
                document.getElementById('v-timer').innerText = "অপেক্ষা করুন: " + timeLeft + "s";
                if(timeLeft <= 0) {
                    isDone = true; clearInterval(timerInt);
                    document.getElementById('v-timer').style.display = 'none';
                    document.getElementById('code-box').style.display = 'block';
                }
            }, 1000);
        } else { clearInterval(timerInt); }
    }
</script>
</body>
</html>
